title: ZTronics
subtitle: "ESP32, Arduino and MPU6050 Tutorials"

name: "ZTronics"

description: "ESP32, Arduino, MPU6050 and OLED tutorials with wiring diagrams, code examples and project guides."

url: "https://ztronics.github.io"
baseurl: "/esp32-mpu6050-snake"

repository: "ZTronics/esp32-mpu6050-snake"

remote_theme: "mmistakes/minimal-mistakes"

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

minimal_mistakes_skin: "dark"

search: true

logo: "/assets/images/logo.png"

breadcrumbs: true

read_time: true

comments: false

share: true

related: true

words_per_minute: 180

enable_copy_code_button: true

atom_feed:
  hide: false

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/ZTronics"

    - label: "YouTube"
      icon: "fab fa-youtube"
      url: "https://youtube.com/@YOURCHANNEL"

    - label: "Pinterest"
      icon: "fab fa-pinterest"
      url: "https://pinterest.com/YOURPROFILE"

defaults:
  - scope:
      path: "_posts"
      type: posts

    values:
      layout: single
      author_profile: false
      read_time: true
      share: true
      related: true
      comments: false

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

permalink: /:title/

markdown: kramdown

highlighter: rouge

sass:
  style: compressed
